<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Groq 093 - Oficial</title>
    
    <!-- Manifest para habilitar la instalación como App -->
    <link rel="manifest" href='data:application/manifest+json,{"name":"Robot093","short_name":"Robot","start_url":".","display":"standalone","background_color":"#050505","theme_color":"#00d2ff","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/4712/4712139.png","sizes":"512x512","type":"image/png"}]}'>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            --bg-color: #050505;
            --robot-color: #00d2ff;
            --eye-size: 20vw;
            --mouth-width: 45vw;
            --mouth-height: 5vh;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: var(--bg-color);
            overflow: hidden; cursor: pointer;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        #face {
            display: flex; flex-direction: column;
            align-items: center; gap: 10vh;
            width: 100%;
        }

        .eyes { display: flex; gap: 15vw; }

        .eye {
            width: var(--eye-size);
            height: var(--eye-size);
            background-color: var(--robot-color);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.4);
            position: relative;
            animation: blink-anim 4s infinite;
        }

        @keyframes blink-anim {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.05); }
        }

        .eye::after {
            content: ''; position: absolute;
            top: 15%; left: 15%; width: 25%; height: 25%;
            background: rgba(255, 255, 255, 0.8); border-radius: 50%;
        }

        #mouth {
            width: var(--mouth-width);
            height: var(--mouth-height);
            background-color: var(--robot-color);
            border-radius: 100px;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
            transition: height 0.1s ease;
        }

        .speaking #mouth {
            animation: talk-anim 0.2s infinite;
        }

        @keyframes talk-anim {
            0%, 100% { height: var(--mouth-height); }
            50% { height: 12vh; }
        }

        /* CUADRO DE DIÁLOGO SÍ/NO */
        #install-modal {
            display: none;
            position: fixed;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 15, 0.98);
            border: 2px solid var(--robot-color);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            z-index: 9999;
            color: white;
            width: 85%;
            max-width: 320px;
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.3);
        }

        .modal-buttons {
            display: flex;
            justify-content: space-around;
            margin-top: 25px;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-yes { background: var(--robot-color); color: #000; }
        .btn-no { background: #333; color: #fff; }
    </style>
</head>
<body onclick="interactuar()">

    <div id="face">
        <div class="eyes">
            <div class="eye"></div>
            <div class="eye"></div>
        </div>
        <div id="mouth"></div>
    </div>

    <!-- Interfaz de instalación -->
    <div id="install-modal">
        <p style="margin: 0; font-size: 1.1rem; line-height: 1.4;">¿Deseas añadir este robot como una aplicación?</p>
        <div class="modal-buttons">
            <button class="btn btn-yes" onclick="confirmarInstalacion(true)">SÍ</button>
            <button class="btn btn-no" onclick="confirmarInstalacion(false)">NO</button>
        </div>
    </div>

    <script>
        const GROQ_API_KEY = "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"; 

        const synth = window.speechSynthesis;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        let recognition;
        let iniciado = false;
        let estaEscuchando = false;
        let deferredPrompt;

        // Capturar evento de instalación
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'es-UY';
            recognition.continuous = false;
            recognition.onstart = () => { estaEscuchando = true; };
            recognition.onend = () => { estaEscuchando = false; };
            recognition.onresult = (event) => {
                const mensaje = event.results[0][0].transcript;
                enviarAGroq(mensaje);
            };
        }

        async function interactuar() {
            if (!iniciado) {
                iniciado = true;
                if (deferredPrompt) {
                    document.getElementById('install-modal').style.display = 'block';
                    hablar("He detectado que puedes instalar esta aplicación. ¿Quieres añadirme a tu pantalla de inicio?");
                } else {
                    hablar("Sistemas Groq activados. ¿En qué puedo ayudarte?");
                }
            } else if (!synth.speaking && !estaEscuchando) {
                if (document.getElementById('install-modal').style.display !== 'block') {
                    escuchar();
                }
            } else if (synth.speaking) {
                synth.cancel();
            }
        }

        function confirmarInstalacion(aceptar) {
            document.getElementById('install-modal').style.display = 'none';
            if (aceptar && deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choice) => {
                    if (choice.outcome === 'accepted') {
                        hablar("Entendido. Iniciando la instalación en tu dispositivo.");
                    }
                    deferredPrompt = null;
                });
            } else {
                hablar("De acuerdo. ¿En qué puedo ayudarte hoy?");
            }
        }

        function hablar(texto) {
            synth.cancel();
            const enunciado = new SpeechSynthesisUtterance(texto);
            enunciado.lang = 'es-ES';
            enunciado.onstart = () => document.body.classList.add('speaking');
            enunciado.onend = () => {
                document.body.classList.remove('speaking');
                if(document.getElementById('install-modal').style.display !== 'block') {
                    setTimeout(escuchar, 500);
                }
            };
            synth.speak(enunciado);
        }

        function escuchar() {
            if (recognition && !estaEscuchando && !synth.speaking) {
                try { recognition.start(); } catch (e) {}
            }
        }

        async function enviarAGroq(pregunta) {
            const url = "https://api.groq.com/openai/v1/chat/completions";
            const requestBody = {
                messages: [
                    { role: "system", content: "Eres un robot amigable y avanzado. Responde de forma natural y completa en español." },
                    { role: "user", content: pregunta }
                ],
                model: "llama-3.3-70b-versatile",
                temperature: 1,
                max_completion_tokens: 1024,
                top_p: 1,
                stream: false
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${GROQ_API_KEY}`
                    },
                    body: JSON.stringify(requestBody)
                });
                const data = await response.json();
                if (data.choices && data.choices[0].message) {
                    hablar(data.choices[0].message.content);
                }
            } catch (error) {
                hablar("Lo siento, hubo un fallo en mi conexión neuronal.");
            }
        }
    </script>
</body>
</html>
