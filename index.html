<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Robot093 Pro</title>
    
    <!-- Configuración para App (APK/PWA) -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">

    <style>
        :root { --color: #00d2ff; --glow: #ffffff; }
        
        body { 
            margin: 0; background: #000; overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            height: 100vh; width: 100vw; 
            display: flex; justify-content: center; align-items: center; 
            touch-action: manipulation;
        }
        
        /* BOTÓN DE INICIO */
        #btn-despertar {
            position: fixed; z-index: 1000; padding: 25px 50px; font-size: 24px;
            font-weight: bold; color: #000; background: var(--color);
            border: none; border-radius: 50px; box-shadow: 0 0 30px var(--color);
            cursor: pointer; text-transform: uppercase; transition: transform 0.2s;
        }
        #btn-despertar:active { transform: scale(0.9); }

        /* CARA DEL ROBOT */
        #face { display: none; flex-direction: column; align-items: center; width: 100%; height: 100%; justify-content: center; cursor: pointer; }
        
        .eyes { display: flex; gap: 15vw; margin-bottom: 10vh; }
        
        .eye { 
            width: 22vw; height: 22vw; background: var(--color); border-radius: 50%; 
            box-shadow: 0 0 30px var(--color); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        /* ESTADO ESCUCHANDO: Ojos Blancos */
        .listening .eye { 
            box-shadow: 0 0 60px var(--glow); 
            background: var(--glow); 
            transform: scale(1.1); 
        }

        #mouth { 
            width: 45vw; height: 20px; background: var(--color); border-radius: 50px; 
            transition: height 0.1s, background 0.4s; 
        }
        
        .listening #mouth { background: var(--glow); box-shadow: 0 0 20px var(--glow); }

        /* ANIMACIÓN AL HABLAR */
        .talking { animation: speak 0.3s infinite; }
        @keyframes speak { 
            0%, 100% { height: 20px; } 
            50% { height: 80px; } 
        }

        /* Bloqueo de selección de texto */
        * { -webkit-tap-highlight-color: transparent; user-select: none; }
    </style>
</head>
<body>

    <button id="btn-despertar" onclick="iniciarRobot()">DESPERTAR Y HABLAR</button>

    <div id="face" onclick="forzarEscucha()">
        <div class="eyes">
            <div class="eye"></div>
            <div class="eye"></div>
        </div>
        <div id="mouth"></div>
    </div>

    <script>
        const API_KEY = "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";
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let estaHablando = false;
        let estaEscuchando = false;

        // Configurar Reconocimiento de Voz
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'es-UY';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => { 
                estaEscuchando = true;
                document.getElementById('face').classList.add('listening');
            };

            recognition.onend = () => { 
                estaEscuchando = false;
                document.getElementById('face').classList.remove('listening');
            };

            recognition.onresult = (event) => {
                const texto = event.results[0][0].transcript;
                enviarAGroq(texto);
            };

            recognition.onerror = (event) => {
                console.error("Error de reconocimiento:", event.error);
                estaEscuchando = false;
                document.getElementById('face').classList.remove('listening');
            };
        }

        function iniciarRobot() {
            document.getElementById('btn-despertar').style.display = 'none';
            document.getElementById('face').style.display = 'flex';
            
            if (navigator.vibrate) navigator.vibrate(100);
            
            // Primera interacción para desbloquear audio en Android
            hablar("Sistemas inicializados. Estoy listo para escucharte.");
        }

        function forzarEscucha() {
            // Si no está hablando y no está ya escuchando, activar micro
            if (!estaHablando && !estaEscuchando) {
                if (navigator.vibrate) navigator.vibrate(50);
                escuchar();
            }
        }

        function escuchar() {
            if (recognition && !estaEscuchando && !estaHablando) {
                try {
                    recognition.start();
                } catch (e) {
                    console.log("Re-activando micro...");
                }
            }
        }

        function hablar(texto) {
            window.speechSynthesis.cancel();
            const enunciado = new SpeechSynthesisUtterance(texto);
            enunciado.lang = 'es-ES';
            enunciado.rate = 1.0; 
            
            enunciado.onstart = () => {
                estaHablando = true;
                document.getElementById('mouth').classList.add('talking');
            };
            
            enunciado.onend = () => {
                estaHablando = false;
                document.getElementById('mouth').classList.remove('talking');
                // Al terminar de hablar, espera un poco y activa el micro solo
                setTimeout(escuchar, 600);
            };
            
            window.speechSynthesis.speak(enunciado);
        }

        async function enviarAGroq(pregunta) {
            try {
                const respuesta = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        messages: [
                            { role: "system", content: "Eres un robot inteligente llamado Robot093. Responde de forma clara y amable." },
                            { role: "user", content: pregunta }
                        ],
                        model: "llama-3.3-70b-versatile"
                    })
                });
                
                const data = await respuesta.json();
                const textoIA = data.choices[0].message.content;
                hablar(textoIA);
                
            } catch (error) {
                hablar("Lo siento, tengo problemas para conectarme a mi servidor.");
            }
        }
    </script>
</body>
</html>
