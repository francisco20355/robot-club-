<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Gemini 093 - Interfaz de Voz</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --robot-color: #00d2ff; /* Celeste neón */
            --eye-size: 22vw;
            --mouth-width: 50vw;
            --mouth-height: 8vh;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: var(--bg-color);
            overflow: hidden; cursor: pointer;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #face {
            display: flex; flex-direction: column;
            align-items: center; gap: 8vh;
            width: 100%;
        }

        .eyes { display: flex; gap: 12vw; }

        .eye {
            width: var(--eye-size);
            height: var(--eye-size);
            background-color: var(--robot-color);
            border-radius: 50%;
            box-shadow: 0 0 50px var(--robot-color);
            transition: all 0.2s ease;
            position: relative;
        }

        /* Reflejo en los ojos para que se vea más "lindo" */
        .eye::after {
            content: ''; position: absolute;
            top: 20%; left: 20%; width: 25%; height: 25%;
            background: rgba(255, 255, 255, 0.8); border-radius: 50%;
        }

        #mouth {
            width: var(--mouth-width);
            height: var(--mouth-height);
            background-color: var(--robot-color);
            border-radius: 100px;
            box-shadow: 0 0 30px var(--robot-color);
            transition: all 0.1s ease;
        }

        /* --- ANIMACIONES --- */

        /* Animación cuando el robot está escuchando */
        .listening .eye {
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(0.85); filter: brightness(1.5); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        /* Animación cuando el robot está hablando */
        .speaking #mouth {
            animation: moveMouth 0.25s infinite;
        }
        @keyframes moveMouth {
            0% { height: var(--mouth-height); transform: scaleX(1); }
            50% { height: 15vh; transform: scaleX(1.1); }
            100% { height: var(--mouth-height); transform: scaleX(1); }
        }
    </style>
</head>
<body onclick="iniciarRobot()">

    <div id="face">
        <div class="eyes">
            <div class="eye" id="l-eye"></div>
            <div class="eye" id="r-eye"></div>
        </div>
        <div id="mouth"></div>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        const API_KEY = "AIzaSyCvtxdy_hkc_gAt29FyJpRCA29NpEIPR5Y"; 
        const MODELO = "gemini-1.5-flash";

        const synth = window.speechSynthesis;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let estadoIniciado = false;

        // Configurar reconocimiento de voz
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'es-UY'; // Localizado para Uruguay
            recognition.continuous = false;

            recognition.onresult = (event) => {
                const mensaje = event.results[0][0].transcript;
                document.body.classList.remove('listening');
                enviarAGemini(mensaje);
            };

            recognition.onerror = () => {
                document.body.classList.remove('listening');
            };
        }

        // Función para arrancar (necesita un click del usuario)
        function iniciarRobot() {
            if (!estadoIniciado) {
                estadoIniciado = true;
                hablar("Hola ¿De qué quieres hablar hoy?");
            } else if (!synth.speaking) {
                escuchar();
            }
        }

        function hablar(texto) {
            synth.cancel(); // Detener cualquier audio previo
            const enunciado = new SpeechSynthesisUtterance(texto);
            enunciado.lang = 'es-ES';
            
            enunciado.onstart = () => document.body.classList.add('speaking');
            enunciado.onend = () => {
                document.body.classList.remove('speaking');
                // Al terminar de hablar, activa el micrófono automáticamente
                setTimeout(escuchar, 500); 
            };

            synth.speak(enunciado);
        }

        function escuchar() {
            if (recognition && !synth.speaking) {
                try {
                    document.body.classList.add('listening');
                    recognition.start();
                } catch (e) {
                    console.log("El reconocimiento ya estaba activo");
                }
            }
        }

        async function enviarAGemini(textoUsuario) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODELO}:generateContent?key=${API_KEY}`;
            
            const configuracion = {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: textoUsuario + " (Responde de forma muy breve, amigable y como un robot)" }]
                    }]
                })
            };

            try {
                const response = await fetch(url, configuracion);
                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content) {
                    const respuestaIA = data.candidates[0].content.parts[0].text;
                    hablar(respuestaIA);
                } else {
                    hablar("Lo siento, mi conexión con la nube falló.");
                }
            } catch (error) {
                console.error(error);
                hablar("Error");
            }
        }
    </script>
</body>
</html>
