<!DOCTYPE html>
<html>
<head>
    <title>Mi Servidor de Juegos</title>
    <style>
        body { background-color: #1a1a1a; color: white; text-align: center; font-family: sans-serif; }
        #game-container { width: 800px; height: 600px; margin: 0 auto; border: 5px solid #ffcc00; }
    </style>
</head>
<body>

    <h1>Bartender: The Right Mix (Version Local)</h1>

    <div id="game-container"></div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", (event) => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("game-container");
            container.appendChild(player);
            
            // Aquí cargamos el archivo .swf que capturaste
            player.load("https://files.crazygames.com/bartendertherightmix.swf");
        });
    </script>

</body>
</html>
