<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Gemini 093 - Oficial</title>
    <!-- Configuración para que se comporte como una App (PWA) con comillas dobles corregidas -->
    <link rel="manifest" href='data:application/manifest+json,{"name":"Robot093","short_name":"Robot","start_url":".","display":"standalone","background_color":"#050505","theme_color":"#00d2ff"}'>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <style>
        :root {
            --bg-color: #050505;
            --robot-color: #00d2ff; /* Celeste Neón */
            --eye-size: 20vw;
            --mouth-width: 45vw;
            --mouth-height: 5vh;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: var(--bg-color);
            overflow: hidden; cursor: pointer;
        }

        #face {
            display: flex; flex-direction: column;
            align-items: center; gap: 10vh;
            width: 100%;
        }

        .eyes { display: flex; gap: 15vw; }

        .eye {
            width: var(--eye-size);
            height: var(--eye-size);
            background-color: var(--robot-color);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.4);
            position: relative;
            /* Animación de parpadeo cada 4 segundos */
            animation: blink-anim 4s infinite;
        }

        @keyframes blink-anim {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.05); }
        }

        /* Brillo estático en los ojos */
        .eye::after {
            content: ''; position: absolute;
            top: 15%; left: 15%; width: 25%; height: 25%;
            background: rgba(255, 255, 255, 0.8); border-radius: 50%;
        }

        #mouth {
            width: var(--mouth-width);
            height: var(--mouth-height);
            background-color: var(--robot-color);
            border-radius: 100px;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
            transition: height 0.1s ease;
        }

        /* La boca solo se mueve cuando el robot habla */
        .speaking #mouth {
            animation: talk-anim 0.2s infinite;
        }

        @keyframes talk-anim {
            0%, 100% { height: var(--mouth-height); }
            50% { height: 12vh; }
        }
    </style>
</head>
<body onclick="interactuar()">

    <div id="face">
        <div class="eyes">
            <div class="eye"></div>
            <div class="eye"></div>
        </div>
        <div id="mouth"></div>
    </div>

    <script>
        // --- TU API KEY DE GEMINI ---
        const API_KEY = "AIzaSyCfCiV6_Sa3fr1C6g7mjsUwq77tg1-RvJA"; 

        const synth = window.speechSynthesis;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        let recognition;
        let deferredPrompt;
        let iniciado = false;
        let estaEscuchando = false;

        // Capturar evento de instalación
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        // Configurar Reconocimiento de Voz
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'es-UY';
            recognition.continuous = false;

            recognition.onstart = () => { estaEscuchando = true; };
            recognition.onend = () => { estaEscuchando = false; };
            
            recognition.onresult = (event) => {
                const mensaje = event.results[0][0].transcript;
                enviarAGemini(mensaje);
            };
        }

        async function interactuar() {
            if (!iniciado) {
                iniciado = true;
                
                // Si la App se puede instalar, lo pregunta primero
                if (deferredPrompt) {
                    hablar("He detectado que puedes añadirme como aplicación. ¿Quieres instalarme en tu dispositivo?");
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then((choiceResult) => {
                        if (choiceResult.outcome === 'accepted') {
                            hablar("¡Genial! Ahora estaré en tu pantalla de inicio.");
                        }
                        deferredPrompt = null;
                    });
                } else {
                    hablar("Hola ¿En qué puedo ayudarte?");
                }
            } else if (!synth.speaking && !estaEscuchando) {
                escuchar();
            }
        }

        function hablar(texto) {
            synth.cancel();
            const enunciado = new SpeechSynthesisUtterance(texto);
            enunciado.lang = 'es-ES';
            
            enunciado.onstart = () => document.body.classList.add('speaking');
            enunciado.onend = () => {
                document.body.classList.remove('speaking');
                // Al terminar de hablar, espera un poco y escucha
                setTimeout(escuchar, 500);
            };
            synth.speak(enunciado);
        }

        function escuchar() {
            if (recognition && !estaEscuchando && !synth.speaking) {
                try {
                    recognition.start();
                } catch (e) { console.log("Micrófono ya activo"); }
            }
        }

        async function enviarAGemini(pregunta) {
            // URL actualizada a v1beta y modelo 1.5-flash para corregir el 404
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            
            const requestBody = {
                contents: [{
                    parts: [{ text: pregunta + " (Responde de forma muy breve, como un robot amigable)" }]
                }]
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();

                if (!response.ok) {
                    console.error("Error detallado:", data);
                    hablar("Tengo un problema con mi conexión de red.");
                    return;
                }

                // Estructura de respuesta corregida para Gemini 1.5
                if (data.candidates && data.candidates[0].content) {
                    const respuestaIA = data.candidates[0].content.parts[0].text;
                    hablar(respuestaIA);
                } else {
                    hablar("No pude procesar esa información.");
                }

            } catch (error) {
                console.error(error);
                hablar("Error en mis circuitos centrales.");
            }
        }
    </script>
</body>
</html>
