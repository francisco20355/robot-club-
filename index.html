<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoboClub T1</title>
    
    <!-- Link al manifiesto que crearemos por código -->
    <link rel="manifest" id="manifest-link">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0a0e17;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* --- ROBOT SOLO CARA Y OJOS --- */
        .head {
            width: 180px;
            height: 180px;
            background: radial-gradient(circle at 30% 30%, #3a3f4b 0%, #1c1f26 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: float 4s ease-in-out infinite;
            transition: 0.3s;
        }

        .eye {
            width: 40px;
            height: 40px;
            background-color: #00fff2;
            border-radius: 50%;
            box-shadow: 0 0 20px #00fff2;
            transition: 0.1s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .talking .eye {
            animation: glow 0.2s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 10px #00fff2; }
            to { box-shadow: 0 0 40px #00fff2; transform: scale(1.1); }
        }

        /* --- INTERFAZ --- */
        .ui {
            margin-top: 40px;
            text-align: center;
            z-index: 10;
        }

        input {
            padding: 12px;
            border-radius: 8px;
            border: none;
            width: 250px;
            background: #1c1f26;
            color: white;
        }

        button {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            background: #00fff2;
            font-weight: bold;
            cursor: pointer;
        }

        #response {
            margin-top: 20px;
            max-width: 300px;
            font-size: 14px;
            color: #00fff2;
        }
    </style>
</head>
<body>

    <div class="head" id="robot">
        <div class="eye"></div>
        <div class="eye"></div>
    </div>

    <div class="ui">
        <input type="text" id="input" placeholder="Pregunta algo...">
        <button onclick="preguntar()">Hablar</button>
        <div id="response"></div>
    </div>

    <script>
        // 1. GENERADOR DE ARCHIVOS DINÁMICOS (Para que sea 1 solo archivo)
        const manifestData = {
            "name": "RoboClub Francisco",
            "short_name": "RoboClub",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#0a0e17",
            "theme_color": "#00fff2",
            "icons": [{"src": "https://cdn-icons-png.flaticon.com/512/4712/4712139.png", "sizes": "512x512", "type": "image/png"}]
        };
        const manifestBlob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
        document.getElementById('manifest-link').setAttribute('href', URL.createObjectURL(manifestBlob));

        // 2. REGISTRO DE SERVICE WORKER "FANTASMA"
        const swCode = "self.addEventListener('fetch', function(event) {});";
        const swBlob = new Blob([swCode], {type: 'text/javascript'});
        const swUrl = URL.createObjectURL(swBlob);
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register(swUrl);
        }

        // 3. PERMISOS Y DETECCIÓN
        window.onload = async () => {
            try {
                await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch (e) { console.log("Micrófono no activado"); }
            
            if (/Android|iPhone/i.test(navigator.userAgent)) {
                alert("¡Instala esta web como App para ver al robot sin pestañas!");
            }
        };

        // 4. LÓGICA DE INTELIGENCIA (GEMINI)
        const API_KEY = "AIzaSyCvtxdy_hkc_gAt29FyJpRCA29NpEIPR5Y";

        async function preguntar() {
            const txt = document.getElementById('input').value;
            const resDiv = document.getElementById('response');
            if(!txt) return;

            resDiv.innerText = "Pensando...";
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{parts: [{text: `Eres RoboClub-T1, robot del Club de Robots de Francisco. Responde corto y robótico: ${txt}`}]}]
                    })
                });
                
                const data = await response.json();
                const respuesta = data.candidates[0].content.parts[0].text;
                
                resDiv.innerText = respuesta;
                hablar(respuesta);
            } catch (e) {
                resDiv.innerText = "Error de conexión.";
            }
        }

        function hablar(texto) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(texto);
            utter.lang = 'es-ES';
            utter.onstart = () => document.getElementById('robot').classList.add('talking');
            utter.onend = () => document.getElementById('robot').classList.remove('talking');
            synth.speak(utter);
        }
    </script>
</body>
</html>
