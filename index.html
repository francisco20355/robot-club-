<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sexto TV | Oficial</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Contenedor de Video */
        .main-container { display: flex; flex: 1; position: relative; background: #000; }
        video { width: 50%; height: 100%; object-fit: cover; background: #111; border-right: 1px solid #222; }
        #localVideo { transform: scaleX(-1); }

        /* Capa del Chat sobre el video */
        #chat-container {
            position: absolute;
            bottom: 120px;
            left: 20px;
            width: 300px;
            height: 200px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }
        #messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; display: flex; flex-direction: column; }
        .msg { background: rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 10px; margin-bottom: 5px; width: fit-content; }
        #chat-input { background: rgba(255,255,255,0.1); border: none; color: white; padding: 10px; border-radius: 0 0 10px 10px; outline: none; }

        /* Barra Inferior */
        .footer { height: 100px; background: #1c1c1e; display: flex; align-items: center; justify-content: center; gap: 15px; border-top: 1px solid #333; }
        .btn { border: none; border-radius: 12px; padding: 15px 30px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; }
        .btn-next { background: #34c759; }
        .btn-stop { background: #ff3b30; }
        .btn-report { background: #ff9500; padding: 15px 20px; }

        /* Info Superior */
        #status-box { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 30px; font-size: 14px; z-index: 100; }
        #user-count { position: absolute; top: 20px; right: 20px; background: rgba(52, 199, 89, 0.8); padding: 10px 20px; border-radius: 30px; font-size: 14px; z-index: 100; }
    </style>
</head>
<body>

    <div id="status-box">🔴 Iniciando...</div>
    <div id="user-count">👥 Usuarios: 0</div>

    <div class="main-container">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay muted playsinline></video>
        
        <div id="chat-container">
            <div id="messages"></div>
            <input type="text" id="chat-input" placeholder="Escribe un mensaje..." onkeypress="enviarChat(event)">
        </div>
    </div>

    <div class="footer">
        <button class="btn btn-stop" onclick="location.reload()">STOP</button>
        <button class="btn btn-next" onclick="buscarSiguiente()">SIGUIENTE</button>
        <button class="btn btn-report" onclick="reportar()">REPORTAR</button>
    </div>

    <script>
        const ABLY_KEY = 'HIAY1w.x1_3_Q:8kTgjL3KPHdx8_NsMeccHEcrOI_g5NAqj76-aDBl3Fs'; 
        const ably = new Ably.Realtime(ABLY_KEY);
        const canalMatch = ably.channels.get('recreo-match');
        const canalChat = ably.channels.get('recreo-chat');
        
        let peer, localStream, currentCall;

        async function iniciar() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                peer = new Peer();
                
                peer.on('open', (id) => {
                    document.getElementById('status-box').innerText = "🟢 En línea";
                    actualizarContador();
                });

                peer.on('call', (call) => {
                    if (currentCall) currentCall.close();
                    currentCall = call;
                    call.answer(localStream);
                    call.on('stream', (s) => document.getElementById('remoteVideo').srcObject = s);
                });

                canalMatch.subscribe('buscando', (msg) => {
                    if (msg.data.peerId !== peer.id && !currentCall) llamarA(msg.data.peerId);
                });

                // Escuchar chat
                canalChat.subscribe('mensaje', (msg) => {
                    mostrarMensaje(msg.data.texto);
                });

            } catch (err) { alert("Activa la cámara"); }
        }

        function actualizarContador() {
            canalMatch.presence.get((err, members) => {
                document.getElementById('user-count').innerText = "👥 Usuarios: " + (members ? members.length : 1);
            });
            canalMatch.presence.enter();
        }

        function buscarSiguiente() {
            if (currentCall) currentCall.close();
            document.getElementById('remoteVideo').srcObject = null;
            document.getElementById('messages').innerHTML = "";
            canalMatch.publish('buscando', { peerId: peer.id });
        }

        function llamarA(id) {
            const call = peer.call(id, localStream);
            call.on('stream', (s) => {
                document.getElementById('remoteVideo').srcObject = s;
                currentCall = call;
            });
        }

        function enviarChat(e) {
            if (e.key === 'Enter') {
                const input = document.getElementById('chat-input');
                if (input.value.trim() !== "") {
                    canalChat.publish('mensaje', { texto: input.value });
                    input.value = "";
                }
            }
        }

        function mostrarMensaje(t) {
            const m = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerText = t;
            m.appendChild(div);
            m.scrollTop = m.scrollHeight;
        }

        function reportar() {
            alert("Usuario reportado. Buscando a alguien más...");
            buscarSiguiente();
        }

        iniciar();
    </script>
</body>
</html>
