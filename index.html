<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Robot Groq 093</title>
    
    <!-- MANIFIESTO PWA: El "display: standalone" es lo que borra las barras del navegador -->
    <link rel="manifest" href='data:application/manifest+json,{"name":"Robot093","short_name":"Robot","start_url":"index.html","display":"standalone","orientation":"portrait","background_color":"#050505","theme_color":"#050505","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/4712/4712139.png","sizes":"512x512","type":"image/png"}]}'>
    
    <!-- Meta etiquetas para iPhone/iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#050505">

    <style>
        :root {
            --bg-color: #050505;
            --robot-color: #00d2ff;
            --eye-size: 20vw;
            --mouth-width: 45vw;
            --mouth-height: 5vh;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: var(--bg-color);
            overflow: hidden; cursor: pointer;
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        #face {
            display: flex; flex-direction: column;
            align-items: center; gap: 10vh;
            width: 100%;
        }

        .eyes { display: flex; gap: 15vw; }

        .eye {
            width: var(--eye-size);
            height: var(--eye-size);
            background-color: var(--robot-color);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.4);
            position: relative;
            animation: blink-anim 4s infinite;
        }

        @keyframes blink-anim {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.05); }
        }

        .eye::after {
            content: ''; position: absolute;
            top: 15%; left: 15%; width: 25%; height: 25%;
            background: rgba(255, 255, 255, 0.8); border-radius: 50%;
        }

        #mouth {
            width: var(--mouth-width);
            height: var(--mouth-height);
            background-color: var(--robot-color);
            border-radius: 100px;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
            transition: height 0.1s ease;
        }

        .speaking #mouth {
            animation: talk-anim 0.2s infinite;
        }

        @keyframes talk-anim {
            0%, 100% { height: var(--mouth-height); }
            50% { height: 12vh; }
        }

        /* INTERFAZ DE INSTALACIÓN */
        #install-modal {
            display: none;
            position: fixed;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 15, 0.95);
            border: 2px solid var(--robot-color);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            z-index: 9999;
            color: white;
            width: 80%;
            max-width: 320px;
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.3);
        }

        .modal-buttons {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-yes { background: var(--robot-color); color: #000; }
        .btn-no { background: #333; color: #fff; }
    </style>
</head>
<body onclick="interactuar()">

    <div id="face">
        <div class="eyes">
            <div class="eye"></div>
            <div class="eye"></div>
        </div>
        <div id="mouth"></div>
    </div>

    <div id="install-modal">
        <p style="margin: 0;">¿Deseas añadir este robot como una aplicación para quitar las barras del navegador?</p>
        <div class="modal-buttons">
            <button class="btn btn-yes" onclick="confirmarInstalacion(true)">SÍ</button>
            <button class="btn btn-no" onclick="confirmarInstalacion(false)">NO</button>
        </div>
    </div>

    <script>
        // REGISTRO DE SERVICE WORKER "EN VIVO"
        // Esto es obligatorio para que Chrome/Android activen el modo "Sin Barras"
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `self.addEventListener('fetch', (e) => { e.respondWith(fetch(e.request)); });`;
                const blob = new Blob([swCode], {type: 'text/javascript'});
                const swUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swUrl).catch(err => console.log("SW error", err));
            });
        }

        const GROQ_API_KEY = "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"; 

        const synth = window.speechSynthesis;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        let recognition;
        let iniciado = false;
        let estaEscuchando = false;
        let deferredPrompt;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'es-UY';
            recognition.onstart = () => { estaEscuchando = true; };
            recognition.onend = () => { estaEscuchando = false; };
            recognition.onresult = (event) => {
                const mensaje = event.results[0][0].transcript;
                enviarAGroq(mensaje);
            };
        }

        async function interactuar() {
            if (!iniciado) {
                iniciado = true;
                if (deferredPrompt) {
                    document.getElementById('install-modal').style.display = 'block';
                    hablar("Hola. ¿Quieres instalarme en tu pantalla de inicio para ocultar las barras del navegador?");
                } else {
                    hablar("Sistemas listos. ¿Qué deseas saber?");
                }
            } else if (!synth.speaking && !estaEscuchando) {
                if (document.getElementById('install-modal').style.display !== 'block') {
                    escuchar();
                }
            } else if (synth.speaking) {
                synth.cancel();
            }
        }

        function confirmarInstalacion(aceptar) {
            document.getElementById('install-modal').style.display = 'none';
            if (aceptar && deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
            } else {
                hablar("Entendido. Continuamos en modo navegador.");
            }
        }

        function hablar(texto) {
            synth.cancel();
            const enunciado = new SpeechSynthesisUtterance(texto);
            enunciado.lang = 'es-ES';
            enunciado.onstart = () => document.body.classList.add('speaking');
            enunciado.onend = () => {
                document.body.classList.remove('speaking');
                if(document.getElementById('install-modal').style.display !== 'block') {
                    setTimeout(escuchar, 500);
                }
            };
            synth.speak(enunciado);
        }

        function escuchar() {
            if (recognition && !estaEscuchando && !synth.speaking) {
                try { recognition.start(); } catch (e) {}
            }
        }

        async function enviarAGroq(pregunta) {
            const fechaHoy = new Date().toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            const horaHoy = new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${GROQ_API_KEY}`
                    },
                    body: JSON.stringify({
                        messages: [
                            { role: "system", content: `Eres un robot avanzado. Información de contexto: Hoy es ${fechaHoy} y son las ${horaHoy}.` },
                            { role: "user", content: pregunta }
                        ],
                        model: "llama-3.3-70b-versatile",
                        temperature: 1,
                        max_completion_tokens: 1024
                    })
                });
                const data = await response.json();
                if (data.choices) hablar(data.choices[0].message.content);
            } catch (error) {
                hablar("Error de conexión neuronal.");
            }
        }
    </script>
</body>
</html>
